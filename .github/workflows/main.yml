---
name: CI - Main

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:

  pre-commit:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    name: Placeholder - Pre-Commit Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Run Pre-Commit Checks
        run: echo Pre-Commit Checks
        shell: bash

  secret:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - pre-commit
    name: Placeholder - Secret Scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Run Secret Scanning
        run: echo Secret Scanning
        shell: bash

  sast:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - pre-commit
    name: Placeholder - SAST
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Run SAST
        run: echo Static Application Security Testing
        shell: bash

  sca:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - pre-commit
    name: Placeholder - SCA
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: Run SCA
        run: echo Software Composition Analysis
        shell: bash

  unit-test:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - secret
      - sca
      - sast
    name: Call Python | UV & Unit Tests
    uses: irishlab-io/.github/.github/workflows/reusable-python-uv.yml@main

    with:
      pytest-enable: true
      python_version: "3.14"
      ruff-enable: false
      ruff_version: "0.12.10"
      uv_version: "0.9.0"
      working_directory: .


  release:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - unit-test

    name: Version - Release bump
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6.0.0
        with:
          python-version: 3.14

      - name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@0.24.0
        with:
          github_token: ${{ secrets.RELEASE_PAT }}
          branch: main
