---
name: CI - Main
run-name: Continuous Integration on ${{ github.head_ref || github.ref_name }} by ${{ github.actor }}

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:

  pre-commit:
    name: Call Prek
    uses: irishlab-io/.github/.github/workflows/reusable-prek.yml@main
    with:
      skips: "actionlint,ggshield,pin-github-action,pytest"

  secret:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - pre-commit
    name: Call Git Guardian
    uses: irishlab-io/.github/.github/workflows/reusable-gitguardian.yml@main
    secrets:
      GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  code_build:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - pre-commit
    name: Call Python UV | Build & Unit Tests
    uses: irishlab-io/.github/.github/workflows/reusable-python-uv.yml@main

    with:
      os-matrix: '["ubuntu-24.04"]'
      python-version-matrix: '["3.10"]'
      pytest-enable: true
      working_directory: .

  code_scan:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - pre-commit
    name: Vulnerabilities Scan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-22.04-arm, ubuntu-24.04, ubuntu-24.04-arm]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Call SAST Scan
        id: sast
        uses: irishlab-io/pin-docker-digest@a708f3d81e706503f85f22d0cdba290710187434 # main

      - name: Call SCA Scan
        id: sca
        uses: irishlab-io/pin-docker-digest@a708f3d81e706503f85f22d0cdba290710187434 # main

  docker_build:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - code_build
    name: Container Build
    runs-on: ubuntu-24.04
    outputs:
      image-tag: ${{ steps.image-tag.outputs.image-tag }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=auto
          tags: |
            type=raw,value=latest,enable={{is_default_branch}},priority=100
            type=ref,event=branch,priority=100
            type=raw,value=gha-${{ github.run_id }},enable=${{github.event_name == 'pull_request'}},priority=200
            type=raw,value=nightly-${{ github.run_id }},enable=${{github.event_name == 'schedule'}},priority=200
            type=ref,event=pr,priority=200
            type=ref,event=tag,priority=200
            type=sha,value={{sha}},enable={{is_default_branch}},priority=300

      - name: Docker Build
        id: build_image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          platforms: |
            linux/amd64
          context: .
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            GIT_COMMIT=${{ github.sha }}
            REPO_URL=${{ github.server_url }}/${{ github.repository }}

      - name: Find the primary image tag we just pushed, and output it
        id: image-tag
        run: |
          # shellcheck disable=SC2086
          echo "image-tag=${STEPS_DOCKER_META_OUTPUTS_VERSION}" >> $GITHUB_OUTPUT
        shell: bash
        env:
          STEPS_DOCKER_META_OUTPUTS_VERSION: ${{ steps.docker_meta.outputs.version }}

  docker_smoke:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - docker_build
    name: Container Smoke Test
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Run Smoke Test
        id: smoke
        run: |
          echo Run Smoke Test
        shell: bash

  docker_scan:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - docker_build
    name: Container Vulnerability Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Call Grype Action
        id: grype
        uses: irishlab-io/pin-docker-digest/.github/actions/grype@main
        with:
          image: ghcr.io/${{ github.repository }}:${{ needs.docker_build.outputs.image-tag }}
          fail: true
          severity: critical
        continue-on-error: true

      - name: Check status of potentially failing step and issue warning
        if: steps.grype.outcome == 'failure'
        run: |
          echo "::error::The previous step detected potential failure in the code. Please review the report above."
        shell: bash

  gating:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - code_scan
      - docker_scan
      - docker_smoke
      - secret
    name: Gating
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Run Gating Check
        id: gating
        run: |
          echo Run Gating Check
        shell: bash

  sbom:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - docker_build
      - docker_scan
      - gating
    name: SBOM Generation & Upload
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Call Syft Action
        id: syft
        uses: irishlab-io/pin-docker-digest/.github/actions/syft@main
        with:
          artifact: ${{ github.run_id }}-sbom.json
          format: cyclonedx-json
          image: ghcr.io/${{ github.repository }}:${{ needs.docker_build.outputs.image-tag }}
          output: ${{ github.workspace }}/${{ github.run_id }}-sbom.json
        continue-on-error: true

  release:
    if: ${{ ! startsWith(github.event.head_commit.message, 'bump:') }}
    needs:
      - gating

    name: Version - Release bump
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.14

      - name: Create bump and changelog
        uses: commitizen-tools/commitizen-action@338bbd841b75aaee6bf5340e1fa12f6ab58ff9ff # 0.27.1
        with:
          github_token: ${{ secrets.RELEASE_PAT }}
          branch: main
