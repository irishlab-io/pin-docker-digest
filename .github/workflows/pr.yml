---
name: CI - PR

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-pr-${{ github.workflow }}
  cancel-in-progress: true

jobs:

  pre-commit:
    name: Pre-Commit Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Run Pre-Commit (prek) Checks
        uses: j178/prek-action@91fd7d7cf70ae1dee9f4f44e7dfa5d1073fe6623 # v1.0.11

        env:
          SKIP: "pytest"

  secret:
    needs:
      - pre-commit
    name: Placeholder - Secret Scanning
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0

      - name: TruffleHog OSS
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: "${{ github.event.repository.default_branch }}"
          head: HEAD
          extra_args: --debug

      - name: Scan Results Status
        if: steps.trufflehog.outcome == 'failure'
        run: |
          echo "Secret Scanning failed."
          echo "Did you leak a secret accidentally?"
          exit 1
        shell: bash

  unit-test:
    needs:
      - secret
    name: Call Python | UV & Unit Tests
    uses: irishlab-io/.github/.github/workflows/reusable-python-uv.yml@main

    with:
      pytest-enable: true
      python_version: "3.14"
      ruff-enable: false
      ruff_version: "0.12.10"
      uv_version: "0.9.0"
      working_directory: .
